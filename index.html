<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }

        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #333;
            font-size: 3rem;
        }

        p {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello 👋</h1>
        <p>Welcome to my sample page.</p>
    </div>

</body>
</html>
